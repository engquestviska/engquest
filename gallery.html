<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>English Quest — Gallery</title>
  <script src="/theme.js"></script>
  <link rel="stylesheet" href="/shared.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0c0c0f;--surface:#131317;--surface2:#1a1a20;--border:#222228;--accent:#7c6ffa;--text:#dddde8;--muted:#5a5a70}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;padding:2rem;text-align:center}
    .icon{font-size:3.5rem;margin-bottom:.5rem}
    h1{font-family:'Fraunces',serif;font-size:1.6rem;font-weight:700}
    p{color:var(--muted);font-size:.9rem;font-weight:300;max-width:300px;line-height:1.6}
    a{color:var(--accent);font-size:.82rem;text-decoration:none}
    a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <div class="icon">🖼️</div>
  <h1>Gallery — Coming Soon</h1>
  <p>Class photos and memorable moments will be available here.</p>
  <a href="javascript:history.back()">← Go back</a>
</body>
</html>
