<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>English Quest — Announcements</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0c0c0f;--surface:#131317;--surface2:#1a1a20;--border:#222228;--accent:#7c6ffa;--amber:#e8a030;--text:#dddde8;--muted:#5a5a70;--subtle:#2e2e3a;--success:#34d399;--danger:#f87171}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;font-size:14px}
    .sidebar{width:210px;flex-shrink:0;height:100vh;position:sticky;top:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
    .sidebar-top{padding:1.75rem 1.5rem 1.5rem;border-bottom:1px solid var(--border)}
    .wordmark{font-size:.9rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text);text-decoration:none;display:block}
    .school-label{font-size:.72rem;color:var(--muted);margin-top:.3rem;font-weight:300}
    .nav{flex:1;padding:1.25rem 1rem;display:flex;flex-direction:column;gap:1px;overflow-y:auto}
    .nav-group-label{font-size:.65rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:1rem .5rem .4rem}
    .nav-link{display:flex;align-items:center;gap:.6rem;padding:.5rem .6rem;border-radius:6px;font-size:.875rem;font-weight:400;color:var(--muted);text-decoration:none;transition:color .12s,background .12s;border:none;background:none;width:100%;text-align:left;cursor:pointer}
    .nav-link svg{width:14px;height:14px;flex-shrink:0;stroke:currentColor}
    .nav-link:hover{color:var(--text);background:var(--surface2)}
    .nav-link.active{color:var(--text);background:var(--surface2);font-weight:500}
    .sidebar-foot{padding:1rem;border-top:1px solid var(--border)}
    .user-row{display:flex;align-items:center;gap:.6rem;padding:.4rem .5rem}
    .avatar{width:28px;height:28px;border-radius:50%;background:var(--subtle);color:var(--accent);font-size:.75rem;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .user-meta{flex:1;min-width:0}
    .user-name{font-size:.8rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
    .user-role{font-size:.68rem;color:var(--muted)}
    .btn-logout{background:none;border:none;cursor:pointer;color:var(--muted);padding:.2rem .4rem;border-radius:4px;transition:color .12s;font-size:.75rem;display:flex;align-items:center;gap:.3rem;font-family:'DM Sans',sans-serif}
    .btn-logout:hover{color:var(--danger)}
    .btn-logout svg{width:13px;height:13px}
    .main{flex:1;padding:2rem 2.5rem;overflow-y:auto;min-width:0}
    .page-heading{font-size:1.2rem;font-weight:600;letter-spacing:-.01em;margin-bottom:2rem}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
    .panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
    .panel-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);font-size:.8rem;font-weight:600;display:flex;align-items:center;justify-content:space-between}
    .panel-body{padding:1.25rem}
    .field{margin-bottom:1rem}
    .field label{display:block;font-size:.7rem;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.4rem}
    .field input,.field textarea,.field select{width:100%;padding:.55rem .85rem;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.84rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .12s;resize:none}
    .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
    .field input::placeholder,.field textarea::placeholder{color:var(--muted)}
    .btn-primary{padding:.55rem 1.25rem;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:.84rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .12s}
    .btn-primary:hover{opacity:.88}
    .btn-danger{padding:.55rem 1.25rem;background:rgba(248,113,113,.1);color:var(--danger);border:1px solid rgba(248,113,113,.2);border-radius:6px;font-size:.84rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s}
    .btn-danger:hover{background:rgba(248,113,113,.2)}
    .type-row{display:flex;gap:.5rem;flex-wrap:wrap}
    .type-btn{padding:.35rem .85rem;border-radius:6px;font-size:.78rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:none;color:var(--muted);transition:all .12s;font-family:'DM Sans',sans-serif}
    .type-btn.active{color:var(--text);background:var(--surface2);border-color:var(--accent)}
    .current-ann{background:var(--surface2);border-radius:8px;padding:1rem;margin-bottom:1rem}
    .current-label{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.5rem}
    .current-title{font-size:.9rem;font-weight:600;margin-bottom:.25rem}
    .current-body{font-size:.82rem;color:var(--muted);font-weight:300;margin-bottom:.5rem}
    .current-meta{font-size:.72rem;color:var(--muted)}
    .empty-state{padding:1.5rem;text-align:center;font-size:.82rem;color:var(--muted);font-weight:300}
    .classes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;margin-top:.4rem}
    .cls-btn{padding:.3rem;border-radius:5px;font-size:.75rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:none;color:var(--muted);transition:all .12s;font-family:'DM Sans',sans-serif;text-align:center}
    .cls-btn.selected{color:var(--accent);border-color:var(--accent);background:rgba(124,111,250,.08)}
    .toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.55rem 1rem;font-size:.78rem;color:var(--muted);display:none;align-items:center;gap:.5rem;box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:100}
    .toast.show{display:flex}
    .toast.success{color:var(--success);border-color:rgba(52,211,153,.3)}
    .toast.error{color:var(--danger);border-color:rgba(248,113,113,.3)}
    @media(max-width:900px){.two-col{grid-template-columns:1fr}}
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-top">
    <a class="wordmark" href="/index.html">English Quest</a>
    <div class="school-label">SMA Negeri 6 Surakarta</div>
  </div>
  <nav class="nav">
    <span class="nav-group-label">Main</span>
    <a class="nav-link" href="/teacher/dashboard.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
    <a class="nav-link" href="/teacher/activeness.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Activeness</a>
    <a class="nav-link" href="/teacher/scores.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Scores</a>
    <span class="nav-group-label">Management</span>
    <a class="nav-link" href="/teacher/submissions.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>Submissions</a>
    <a class="nav-link" href="/teacher/task-status.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Task Status</a>
    <a class="nav-link" href="/teacher/attendance.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Attendance</a>
    <a class="nav-link" href="/teacher/strikes.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Strikes</a>
    <a class="nav-link active" href="/teacher/announcements.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>Announcements</a>
  </nav>
  <div class="sidebar-foot">
    <div class="user-row">
      <div class="avatar" id="avatar-initials">—</div>
      <div class="user-meta">
        <div class="user-name" id="user-name">Loading</div>
        <div class="user-role">Teacher</div>
      </div>
      <button class="btn-logout" onclick="handleLogout()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Log out
      </button>
    </div>
  </div>
</aside>

<div class="main">
  <div class="page-heading">Announcements & Summative</div>

  <div class="two-col">

    <!-- Announcement panel -->
    <div class="panel">
      <div class="panel-header">
        <span>📢 Announcement</span>
      </div>
      <div class="panel-body">
        <div id="current-ann-wrap"></div>

        <div class="field">
          <label>Type</label>
          <div class="type-row" id="type-row">
            <button class="type-btn active" data-type="info" onclick="selectType('info',this)">📘 Info</button>
            <button class="type-btn" data-type="warning" onclick="selectType('warning',this)">⚠️ Warning</button>
            <button class="type-btn" data-type="success" onclick="selectType('success',this)">✅ Success</button>
            <button class="type-btn" data-type="urgent" onclick="selectType('urgent',this)">🚨 Urgent</button>
          </div>
        </div>
        <div class="field">
          <label>Title</label>
          <input type="text" id="ann-title" placeholder="e.g. Chapter 5 Quiz Next Week!"/>
        </div>
        <div class="field">
          <label>Message</label>
          <textarea id="ann-body" rows="3" placeholder="Write your announcement here..."></textarea>
        </div>
        <div style="display:flex;gap:.5rem;flex-wrap:wrap">
          <button class="btn-primary" onclick="postAnnouncement()">Post Announcement</button>
          <button class="btn-danger" onclick="clearAnnouncement()">Clear</button>
        </div>
      </div>
    </div>

    <!-- Summative panel -->
    <div class="panel">
      <div class="panel-header">
        <span>📝 Summative Info</span>
      </div>
      <div class="panel-body">
        <div id="current-summ-wrap"></div>

        <div class="field">
          <label>Exam Date</label>
          <input type="date" id="summ-date"/>
        </div>
        <div class="field">
          <label>Title / Topic</label>
          <input type="text" id="summ-title" placeholder="e.g. Chapter 4 & 5 — Present Perfect"/>
        </div>
        <div class="field">
          <label>What to Study</label>
          <textarea id="summ-study" rows="2" placeholder="e.g. Grammar, Vocabulary Box words..."></textarea>
        </div>
        <div class="field">
          <label>Classes</label>
          <div class="classes-grid" id="classes-grid"></div>
        </div>
        <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-top:1rem">
          <button class="btn-primary" onclick="postSummative()">Save & Publish</button>
          <button class="btn-danger" onclick="clearSummative()">Clear</button>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"><span id="toast-text"></span></div>

<script>
const SUPABASE_URL='https://unbvljjgiqyphtykbkdb.supabase.co';
const SUPABASE_KEY='sb_publishable_DFTQJ5niT0OiWVwpeNwM1A_W18mJ1oT';
const{createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_KEY);
const CLASSES=['XE1','XE4','XE5','XE6','XE7','XE8','XE9','XE10','XE11'];
let selectedType='info';
let selectedClasses=new Set(CLASSES);

async function init(){
  const{data:{user}}=await db.auth.getUser();
  if(!user){window.location.href='/index-login.html';return}
  if(user.user_metadata?.role!=='teacher'){window.location.href='/index.html';return}
  const name=user.email.split('@')[0];
  document.getElementById('user-name').textContent=name;
  document.getElementById('avatar-initials').textContent=name[0].toUpperCase();

  // Build class buttons
  document.getElementById('classes-grid').innerHTML=CLASSES.map(c=>`
    <button class="cls-btn selected" data-cls="${c}" onclick="toggleClass('${c}',this)">${c}</button>
  `).join('');

  await Promise.all([loadAnnouncement(),loadSummative()]);
}

function selectType(type,btn){
  selectedType=type;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function toggleClass(cls,btn){
  if(selectedClasses.has(cls)){selectedClasses.delete(cls);btn.classList.remove('selected')}
  else{selectedClasses.add(cls);btn.classList.add('selected')}
}

async function loadAnnouncement(){
  const{data}=await db.from('announcements').select('*').order('posted_at',{ascending:false}).limit(1).single();
  const wrap=document.getElementById('current-ann-wrap');
  if(!data){wrap.innerHTML='<div class="empty-state">No active announcement.</div>';return}
  const typeColors={info:'#7c6ffa',warning:'#e8a030',success:'#34d399',urgent:'#f87171'};
  const color=typeColors[data.type]||'#7c6ffa';
  wrap.innerHTML=`<div class="current-ann">
    <div class="current-label" style="color:${color}">Current Announcement</div>
    <div class="current-title">${data.title||''}</div>
    <div class="current-body">${data.body||''}</div>
    <div class="current-meta">Posted ${new Date(data.posted_at).toLocaleDateString('en-ID',{day:'numeric',month:'short',year:'numeric'})}</div>
  </div>`;
  document.getElementById('ann-title').value=data.title||'';
  document.getElementById('ann-body').value=data.body||'';
  selectType(data.type||'info',document.querySelector(`[data-type="${data.type||'info'}"]`));
}

async function loadSummative(){
  const{data}=await db.from('summative').select('*').order('updated_at',{ascending:false}).limit(1).single();
  const wrap=document.getElementById('current-summ-wrap');
  if(!data){wrap.innerHTML='<div class="empty-state">No summative info set.</div>';return}
  wrap.innerHTML=`<div class="current-ann">
    <div class="current-label" style="color:var(--accent)">Current Summative</div>
    <div class="current-title">${data.title||''}</div>
    <div class="current-body">📅 ${data.exam_date?new Date(data.exam_date+'T00:00:00').toLocaleDateString('en-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'}):''}</div>
    <div class="current-meta">${(data.classes||[]).join(', ')}</div>
  </div>`;
  document.getElementById('summ-date').value=data.exam_date||'';
  document.getElementById('summ-title').value=data.title||'';
  document.getElementById('summ-study').value=data.study_notes||'';
  selectedClasses=new Set(data.classes||CLASSES);
  document.querySelectorAll('.cls-btn').forEach(b=>{
    b.classList.toggle('selected',selectedClasses.has(b.dataset.cls));
  });
}

async function postAnnouncement(){
  const title=document.getElementById('ann-title').value.trim();
  const body=document.getElementById('ann-body').value.trim();
  if(!title&&!body){showToast('Please enter a title or message','error');return}
  const{data:{user}}=await db.auth.getUser();
  await db.from('announcements').delete().neq('id','00000000-0000-0000-0000-000000000000');
  await db.from('announcements').insert({title,body,type:selectedType,posted_by:user.id});
  await loadAnnouncement();
  showToast('Announcement posted!','success');
}

async function clearAnnouncement(){
  await db.from('announcements').delete().neq('id','00000000-0000-0000-0000-000000000000');
  document.getElementById('ann-title').value='';
  document.getElementById('ann-body').value='';
  document.getElementById('current-ann-wrap').innerHTML='<div class="empty-state">No active announcement.</div>';
  showToast('Announcement cleared','success');
}

async function postSummative(){
  const date=document.getElementById('summ-date').value;
  const title=document.getElementById('summ-title').value.trim();
  const study=document.getElementById('summ-study').value.trim();
  if(!date||!title){showToast('Please fill in date and title','error');return}
  await db.from('summative').delete().neq('id','00000000-0000-0000-0000-000000000000');
  await db.from('summative').insert({title,exam_date:date,study_notes:study,classes:[...selectedClasses]});
  await loadSummative();
  showToast('Summative published!','success');
}

async function clearSummative(){
  await db.from('summative').delete().neq('id','00000000-0000-0000-0000-000000000000');
  document.getElementById('summ-date').value='';
  document.getElementById('summ-title').value='';
  document.getElementById('summ-study').value='';
  document.getElementById('current-summ-wrap').innerHTML='<div class="empty-state">No summative info set.</div>';
  showToast('Summative cleared','success');
}

function showToast(msg,type){
  const el=document.getElementById('toast');
  document.getElementById('toast-text').textContent=msg;
  el.className='toast show '+(type||'');
  setTimeout(()=>el.className='toast',3000);
}

async function handleLogout(){await db.auth.signOut();window.location.href='/index-login.html'}
init();
</script>
</body>
</html>
