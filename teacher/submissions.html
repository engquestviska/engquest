<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>English Quest — Submissions</title>
  <script src="/theme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0c0c0f;--surface:#131317;--surface2:#1a1a20;--border:#222228;--accent:#7c6ffa;--amber:#e8a030;--text:#dddde8;--muted:#5a5a70;--subtle:#2e2e3a;--success:#34d399;--danger:#f87171}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;font-size:14px}
    .sidebar{width:210px;flex-shrink:0;height:100vh;position:sticky;top:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
    .sidebar-top{padding:1.75rem 1.5rem 1.5rem;border-bottom:1px solid var(--border)}
    .wordmark{font-size:.9rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text)}
    .school-label{font-size:.72rem;color:var(--muted);margin-top:.3rem;font-weight:300}
    .nav{flex:1;padding:1.25rem 1rem;display:flex;flex-direction:column;gap:1px;overflow-y:auto}
    .nav-group-label{font-size:.65rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:1rem .5rem .4rem}
    .nav-link{display:flex;align-items:center;gap:.6rem;padding:.5rem .6rem;border-radius:6px;font-size:.875rem;font-weight:400;color:var(--muted);text-decoration:none;transition:color .12s,background .12s;border:none;background:none;width:100%;text-align:left;cursor:pointer}
    .nav-link svg{width:14px;height:14px;flex-shrink:0;stroke:currentColor}
    .nav-link:hover{color:var(--text);background:var(--surface2)}
    .nav-link.active{color:var(--text);background:var(--surface2);font-weight:500}
    .sidebar-foot{padding:1rem;border-top:1px solid var(--border)}
    .user-row{display:flex;align-items:center;gap:.6rem;padding:.4rem .5rem}
    .avatar{width:28px;height:28px;border-radius:50%;background:var(--subtle);color:var(--accent);font-size:.75rem;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .user-meta{flex:1;min-width:0}
    .user-name{font-size:.8rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
    .user-role{font-size:.68rem;color:var(--muted)}
    .btn-logout{background:none;border:none;cursor:pointer;color:var(--muted);padding:.2rem;border-radius:4px;transition:color .12s;display:flex;align-items:center}
    .btn-logout:hover{color:var(--danger)}
    .btn-logout svg{width:14px;height:14px}
    .main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
    .topbar{padding:1.5rem 2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-shrink:0}
    .page-heading{font-size:1.2rem;font-weight:600;letter-spacing:-.01em}
    .class-tabs{display:flex;gap:4px;flex-wrap:wrap}
    .class-tab{padding:.3rem .75rem;border-radius:6px;font-size:.78rem;font-weight:500;color:var(--muted);background:none;border:1px solid var(--border);cursor:pointer;transition:all .12s;font-family:'DM Sans',sans-serif}
    .class-tab:hover{color:var(--text);border-color:var(--subtle)}
    .class-tab.active{color:var(--text);background:var(--surface2);border-color:var(--accent)}
    .toolbar{padding:.75rem 2rem;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
    .task-tabs{display:flex;gap:4px;flex-wrap:wrap}
    .task-tab{padding:.3rem .65rem;border-radius:6px;font-size:.75rem;font-weight:500;color:var(--muted);background:none;border:1px solid var(--border);cursor:pointer;transition:all .12s;font-family:'DM Sans',sans-serif}
    .task-tab:hover{color:var(--text)}
    .task-tab.active{color:var(--text);background:var(--surface2);border-color:var(--accent)}
    .filter-btn{padding:.3rem .75rem;border-radius:6px;font-size:.75rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:none;color:var(--muted);transition:all .12s;font-family:'DM Sans',sans-serif}
    .filter-btn:hover{color:var(--text)}
    .filter-btn.active{color:var(--danger);border-color:var(--danger);background:rgba(248,113,113,.06)}
    .summary{margin-left:auto;font-size:.78rem;color:var(--muted);font-weight:300;white-space:nowrap}
    .table-wrap{flex:1;overflow:auto}
    table{border-collapse:collapse;min-width:100%}
    thead{position:sticky;top:0;z-index:10;background:var(--surface)}
    thead th{font-size:.67rem;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:.75rem 1rem;border-bottom:1px solid var(--border);white-space:nowrap;text-align:left}
    thead th:first-child{padding-left:2rem;width:40px}
    tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
    tbody tr:hover{background:var(--surface)}
    tbody td{padding:.6rem 1rem;vertical-align:middle}
    td:first-child{padding-left:2rem;font-size:.72rem;color:var(--muted);font-weight:300}
    .student-name{font-size:.84rem;font-weight:400}
    .status-badge{display:inline-flex;align-items:center;gap:.35rem;font-size:.72rem;font-weight:500;padding:.2rem .6rem;border-radius:999px}
    .status-badge.submitted{background:rgba(52,211,153,.1);color:var(--success)}
    .status-badge.not-submitted{background:var(--surface2);color:var(--muted)}
    .submit-date{font-size:.72rem;color:var(--muted);font-weight:300;margin-top:.15rem}
    .btn-dl{padding:.3rem .7rem;border-radius:6px;font-size:.75rem;font-weight:500;cursor:pointer;border:1px solid rgba(124,111,250,.3);background:rgba(124,111,250,.06);color:var(--accent);transition:all .12s;font-family:'DM Sans',sans-serif}
    .btn-dl:hover{background:rgba(124,111,250,.12)}
    .state-msg{padding:3rem 2rem;color:var(--muted);font-size:.84rem;font-weight:300}
    .main{animation:fadeUp .25s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-top">
    <div class="wordmark">English Quest</div>
    <div class="school-label">SMA Negeri 6 Surakarta</div>
  </div>
  <nav class="nav">
    <span class="nav-group-label">Main</span>
    <a class="nav-link" href="/teacher/dashboard.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
    <a class="nav-link" href="/teacher/activeness.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Activeness</a>
    <a class="nav-link" href="/teacher/scores.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Scores</a>
    <span class="nav-group-label">Management</span>
    <a class="nav-link active" href="/teacher/submissions.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>Submissions</a>
    <a class="nav-link" href="/teacher/attendance.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Attendance</a>
    <a class="nav-link" href="/teacher/strikes.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Strikes</a>
    <a class="nav-link" href="/teacher/materials.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>Materials</a>
    <a class="nav-link" href="/teacher/gallery.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Gallery</a>
  </nav>
  <div class="sidebar-foot">
    <div class="user-row">
      <div class="avatar" id="avatar-initials">—</div>
      <div class="user-meta">
        <div class="user-name" id="user-name">Loading</div>
        <div class="user-role">Teacher</div>
      </div>
      <button class="btn-logout theme-toggle-btn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
      <button class="btn-logout" onclick="handleLogout()" title="Log out">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>
</aside>
<div class="main">
  <div class="topbar">
    <div class="page-heading">Submissions</div>
    <div class="class-tabs" id="class-tabs"></div>
  </div>
  <div class="toolbar">
    <div class="task-tabs" id="task-tabs"></div>
    <button class="filter-btn" id="filter-btn" onclick="toggleFilter()">Show Missing Only</button>
    <div class="summary" id="summary"></div>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Student</th>
          <th>Status</th>
          <th>Submitted</th>
          <th>File</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="5"><div class="state-msg">Select a class to begin.</div></td></tr>
      </tbody>
    </table>
  </div>
</div>
<script>
const SUPABASE_URL='https://unbvljjgiqyphtykbkdb.supabase.co';
const SUPABASE_KEY='sb_publishable_DFTQJ5niT0OiWVwpeNwM1A_W18mJ1oT';
const{createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_KEY);
const CLASSES=['XE1','XE4','XE5','XE6','XE7','XE8','XE9','XE10','XE11'];
const TASKS={C5:5};
let currentClass=null,currentChapter='C5',currentTask=1,showMissingOnly=false;
let students=[],submissionsMap={};

async function init(){
  const{data:{user}}=await db.auth.getUser();
  if(!user){window.location.href='/index-login.html';return}
  if(user.user_metadata?.role!=='teacher'){window.location.href='/student/dashboard.html';return}
  const name=user.email.split('@')[0];
  document.getElementById('user-name').textContent=name;
  document.getElementById('avatar-initials').textContent=name[0].toUpperCase();
  document.getElementById('class-tabs').innerHTML=CLASSES.map(c=>`<button class="class-tab" onclick="selectClass('${c}')">${c}</button>`).join('');
  buildTaskTabs();
}

function buildTaskTabs(){
  const count=TASKS[currentChapter]||5;
  document.getElementById('task-tabs').innerHTML=
    Array.from({length:count},(_,i)=>`<button class="task-tab ${i===0?'active':''}" onclick="selectTask(${i+1},this)">Task ${i+1}</button>`).join('');
  currentTask=1;
}

async function selectClass(cls){
  currentClass=cls;
  document.querySelectorAll('.class-tab').forEach(t=>t.classList.toggle('active',t.textContent===cls));
  await loadData();
}

function selectTask(task,btn){
  currentTask=task;
  document.querySelectorAll('.task-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function toggleFilter(){
  showMissingOnly=!showMissingOnly;
  const btn=document.getElementById('filter-btn');
  btn.classList.toggle('active',showMissingOnly);
  btn.textContent=showMissingOnly?'Show All':'Show Missing Only';
  renderTable();
}

async function loadData(){
  document.getElementById('tbody').innerHTML=`<tr><td colspan="5"><div class="state-msg">Loading...</div></td></tr>`;
  const{data:classRow}=await db.from('classes').select('id').eq('name',currentClass).single();
  if(!classRow)return;
  const{data:rows}=await db.from('students').select('id,full_name').eq('class_id',classRow.id).order('full_name');
  if(!rows||!rows.length){document.getElementById('tbody').innerHTML=`<tr><td colspan="5"><div class="state-msg">No students found.</div></td></tr>`;return}
  students=rows;
  const{data:subs}=await db.from('submissions').select('*').in('student_id',rows.map(r=>r.id)).eq('chapter',currentChapter);
  submissionsMap={};
  (subs||[]).forEach(s=>{submissionsMap[s.student_id+'_'+s.task_number]=s});
  renderTable();
}

function renderTable(){
  const list=showMissingOnly
    ?students.filter(s=>!submissionsMap[s.id+'_'+currentTask])
    :students;
  const submitted=students.filter(s=>submissionsMap[s.id+'_'+currentTask]).length;
  document.getElementById('summary').textContent=`${submitted} / ${students.length} submitted`;
  if(!list.length){
    document.getElementById('tbody').innerHTML=`<tr><td colspan="5"><div class="state-msg">${showMissingOnly?'Everyone has submitted this task!':'No students found.'}</div></td></tr>`;
    return;
  }
  document.getElementById('tbody').innerHTML=list.map((s,i)=>{
    const sub=submissionsMap[s.id+'_'+currentTask];
    const submitted=!!sub;
    const date=sub?new Date(sub.submitted_at).toLocaleDateString('en-ID',{day:'numeric',month:'short',year:'numeric'}):null;
    return`<tr>
      <td>${String(i+1).padStart(2,'0')}</td>
      <td><div class="student-name">${s.full_name}</div></td>
      <td><span class="status-badge ${submitted?'submitted':'not-submitted'}">${submitted?'✓ Submitted':'Not submitted'}</span></td>
      <td><div class="submit-date">${date||'—'}</div></td>
      <td>${submitted?`<button class="btn-dl" onclick="downloadFile('${sub.file_url}','${s.full_name.split(' ')[0]}_T${currentTask}')">Download</button>`:'—'}</td>
    </tr>`;
  }).join('');
}

async function downloadFile(path,filename){
  const{data}=await db.storage.from('submissions').createSignedUrl(path,60);
  if(!data?.signedUrl)return;
  const a=document.createElement('a');
  a.href=data.signedUrl;
  a.download=filename+'.pdf';
  a.click();
}

async function handleLogout(){await db.auth.signOut();window.location.href='/index-login.html'}
init();
</script>
</body>
</html>
