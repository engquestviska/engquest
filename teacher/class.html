<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>English Quest — Class</title>
  <script src="/theme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0c0c0f;--surface:#131317;--surface2:#1a1a20;--border:#222228;--accent:#7c6ffa;--amber:#e8a030;--text:#dddde8;--muted:#5a5a70;--subtle:#2e2e3a;--success:#34d399;--danger:#f87171}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;font-size:14px}
    .sidebar{width:210px;flex-shrink:0;height:100vh;position:sticky;top:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
    .sidebar-top{padding:1.75rem 1.5rem 1.5rem;border-bottom:1px solid var(--border)}
    .wordmark{font-size:.9rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text)}
    .school-label{font-size:.72rem;color:var(--muted);margin-top:.3rem;font-weight:300}
    .nav{flex:1;padding:1.25rem 1rem;display:flex;flex-direction:column;gap:1px;overflow-y:auto}
    .nav-group-label{font-size:.65rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:1rem .5rem .4rem}
    .nav-link{display:flex;align-items:center;gap:.6rem;padding:.5rem .6rem;border-radius:6px;font-size:.875rem;font-weight:400;color:var(--muted);text-decoration:none;transition:color .12s,background .12s;border:none;background:none;width:100%;text-align:left;cursor:pointer}
    .nav-link svg{width:14px;height:14px;flex-shrink:0;stroke:currentColor}
    .nav-link:hover{color:var(--text);background:var(--surface2)}
    .nav-link.active{color:var(--text);background:var(--surface2);font-weight:500}
    .sidebar-foot{padding:1rem;border-top:1px solid var(--border)}
    .user-row{display:flex;align-items:center;gap:.6rem;padding:.4rem .5rem}
    .avatar{width:28px;height:28px;border-radius:50%;background:var(--subtle);color:var(--accent);font-size:.75rem;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .user-meta{flex:1;min-width:0}
    .user-name{font-size:.8rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
    .user-role{font-size:.68rem;color:var(--muted)}
    .btn-logout{background:none;border:none;cursor:pointer;color:var(--muted);padding:.2rem;border-radius:4px;transition:color .12s;display:flex;align-items:center}
    .btn-logout:hover{color:var(--danger)}
    .btn-logout svg{width:14px;height:14px}
    .main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;animation:fadeUp .25s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .topbar{padding:1.5rem 2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1rem;flex-shrink:0}
    .back-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);padding:.3rem .6rem;cursor:pointer;font-size:.78rem;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:.4rem;transition:color .12s,border-color .12s}
    .back-btn:hover{color:var(--text);border-color:var(--subtle)}
    .back-btn svg{width:13px;height:13px;stroke:currentColor}
    .page-heading{font-size:1.2rem;font-weight:600;letter-spacing:-.01em}
    .class-badge{font-size:.75rem;font-weight:500;background:rgba(124,111,250,.12);color:var(--accent);border:1px solid rgba(124,111,250,.25);border-radius:6px;padding:.2rem .6rem;margin-left:.25rem}
    .content{flex:1;overflow-y:auto;padding:2rem}
    .stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem;margin-bottom:2rem}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.1rem 1.25rem}
    .stat-label{font-size:.7rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem}
    .stat-value{font-size:1.6rem;font-weight:600;color:var(--text);line-height:1}
    .stat-value.accent{color:var(--accent)}
    .stat-value.amber{color:var(--amber)}
    .stat-value.success{color:var(--success)}
    .section-heading{font-size:.72rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem;margin-top:2rem}
    .section-heading:first-of-type{margin-top:0}
    .quick-links{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.75rem;margin-bottom:2rem}
    .quick-link{display:flex;align-items:center;gap:.75rem;padding:.85rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--muted);text-decoration:none;transition:all .12s;cursor:pointer}
    .quick-link:hover{color:var(--text);border-color:var(--subtle);background:var(--surface2)}
    .quick-link svg{width:16px;height:16px;flex-shrink:0;stroke:currentColor}
    .quick-link-label{font-size:.84rem;font-weight:500}
    .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
    table{border-collapse:collapse;width:100%}
    thead th{font-size:.67rem;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:.75rem 1rem;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
    tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
    tbody tr:last-child{border-bottom:none}
    tbody tr:hover{background:var(--surface2)}
    tbody td{padding:.6rem 1rem;vertical-align:middle;font-size:.84rem}
    .td-no{color:var(--muted);font-size:.72rem;width:36px}
    .td-name{font-weight:500}
    .td-email{color:var(--muted);font-size:.78rem}
    .state-msg{padding:3rem 1.5rem;color:var(--muted);font-size:.84rem;font-weight:300;text-align:center}
    @media(max-width:700px){.sidebar{display:none}.content{padding:1rem}.stats-row{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-top">
    <div class="wordmark">English Quest</div>
    <div class="school-label">SMA Negeri 6 Surakarta</div>
  </div>
  <nav class="nav">
    <span class="nav-group-label">Main</span>
    <a class="nav-link active" href="/teacher/dashboard.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
    <a class="nav-link" href="/teacher/activeness.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Activeness</a>
    <a class="nav-link" href="/teacher/scores.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Scores</a>
    <span class="nav-group-label">Management</span>
    <a class="nav-link" href="/teacher/submissions.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>Submissions</a>
    <a class="nav-link" href="/teacher/task-status.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Task Status</a>
    <a class="nav-link" href="/teacher/attendance.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Attendance</a>
    <a class="nav-link" href="/teacher/strikes.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Strikes</a>
    <a class="nav-link" href="/teacher/materials.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>Materials</a>
    <a class="nav-link" href="/teacher/gallery.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Gallery</a>
  </nav>
  <div class="sidebar-foot">
    <div class="user-row">
      <div class="avatar" id="avatar-initials">—</div>
      <div class="user-meta">
        <div class="user-name" id="user-name">Loading</div>
        <div class="user-role">Teacher</div>
      </div>
      <button class="btn-logout theme-toggle-btn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
      <button class="btn-logout" onclick="handleLogout()" title="Log out">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>
</aside>
<div class="main">
  <div class="topbar">
    <button class="back-btn" onclick="history.back()">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><polyline points="15 18 9 12 15 6"/></svg>Back
    </button>
    <div class="page-heading">Class <span class="class-badge" id="class-badge">—</span></div>
  </div>
  <div class="content">
    <div class="stats-row" id="stats-row">
      <div class="stat-card"><div class="stat-label">Students</div><div class="stat-value accent" id="stat-students">—</div></div>
      <div class="stat-card"><div class="stat-label">Submissions</div><div class="stat-value amber" id="stat-submissions">—</div></div>
      <div class="stat-card"><div class="stat-label">Strikes</div><div class="stat-value" id="stat-strikes" style="color:var(--danger)">—</div></div>
      <div class="stat-card"><div class="stat-label">Activeness Entries</div><div class="stat-value success" id="stat-activeness">—</div></div>
    </div>

    <div class="section-heading">Quick Actions</div>
    <div class="quick-links" id="quick-links"></div>

    <div class="section-heading">Students</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="td-no">#</th>
            <th>Name</th>
            <th>Email</th>
          </tr>
        </thead>
        <tbody id="student-tbody">
          <tr><td colspan="3"><div class="state-msg">Loading...</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script>
const SUPABASE_URL='https://unbvljjgiqyphtykbkdb.supabase.co';
const SUPABASE_KEY='sb_publishable_DFTQJ5niT0OiWVwpeNwM1A_W18mJ1oT';
const{createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_KEY);

const params=new URLSearchParams(location.search);
const className=params.get('class')||'';

const QUICK_LINKS=[
  {label:'Task Status',href:'/teacher/task-status.html',icon:'<polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>'},
  {label:'Submissions',href:'/teacher/submissions.html',icon:'<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>'},
  {label:'Scores',href:'/teacher/scores.html',icon:'<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>'},
  {label:'Activeness',href:'/teacher/activeness.html',icon:'<polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>'},
  {label:'Attendance',href:'/teacher/attendance.html',icon:'<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>'},
  {label:'Strikes',href:'/teacher/strikes.html',icon:'<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>'},
];

async function init(){
  const{data:{user}}=await db.auth.getUser();
  if(!user){window.location.href='/index-login.html';return}
  if(user.user_metadata?.role!=='teacher'){window.location.href='/student/dashboard.html';return}

  const name=user.email.split('@')[0];
  document.getElementById('user-name').textContent=name;
  document.getElementById('avatar-initials').textContent=name[0].toUpperCase();

  if(!className){
    document.getElementById('student-tbody').innerHTML='<tr><td colspan="3"><div class="state-msg">No class specified.</div></td></tr>';
    return;
  }

  document.getElementById('class-badge').textContent=className;
  document.title=`English Quest — ${className}`;

  renderQuickLinks();
  await loadData();
}

function renderQuickLinks(){
  document.getElementById('quick-links').innerHTML=QUICK_LINKS.map(l=>`
    <a class="quick-link" href="${l.href}">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">${l.icon}</svg>
      <span class="quick-link-label">${l.label}</span>
    </a>
  `).join('');
}

async function loadData(){
  const{data:classRow}=await db.from('classes').select('id').eq('name',className).single();
  if(!classRow){
    document.getElementById('student-tbody').innerHTML='<tr><td colspan="3"><div class="state-msg">Class not found.</div></td></tr>';
    return;
  }

  const classId=classRow.id;

  const{data:students,error:studentsErr}=await db
    .from('students').select('id,full_name,user_id').eq('class_id',classId).order('full_name');

  document.getElementById('stat-students').textContent=students?.length??'—';

  if(students&&students.length){
    const ids=students.map(s=>s.id);
    const[{count:subCount},{count:strikeCount},{count:activenessCount}]=await Promise.all([
      db.from('submissions').select('id',{count:'exact',head:true}).in('student_id',ids),
      db.from('strikes').select('id',{count:'exact',head:true}).in('student_id',ids),
      db.from('activeness').select('id',{count:'exact',head:true}).in('student_id',ids),
    ]);
    document.getElementById('stat-submissions').textContent=subCount??'—';
    document.getElementById('stat-strikes').textContent=strikeCount??'—';
    document.getElementById('stat-activeness').textContent=activenessCount??'—';
  }

  if(studentsErr||!students||!students.length){
    document.getElementById('student-tbody').innerHTML='<tr><td colspan="3"><div class="state-msg">No students found.</div></td></tr>';
    return;
  }

  document.getElementById('student-tbody').innerHTML=students.map((s,i)=>`
    <tr>
      <td class="td-no">${String(i+1).padStart(2,'0')}</td>
      <td class="td-name">${escHtml(s.full_name)}</td>
      <td class="td-email">${s.user_id?'<span style="color:var(--success);font-size:.7rem;">✓ account</span>':'<span style="color:var(--muted);font-size:.7rem;">no account</span>'}</td>
    </tr>
  `).join('');
}

function escHtml(str){
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function handleLogout(){await db.auth.signOut();window.location.href='/index-login.html'}
init().catch(console.error);
</script>
</body>
</html>
