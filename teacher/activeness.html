<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>English Quest — Activeness</title>
  <script src="/theme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0c0c0f;
      --surface: #131317;
      --surface2:#1a1a20;
      --border:  #222228;
      --accent:  #7c6ffa;
      --text:    #dddde8;
      --muted:   #5a5a70;
      --subtle:  #2e2e3a;
      --success: #34d399;
      --danger:  #f87171;
      --amber:   #e8a030;

      /* Fixed column widths */
      --col-no:     40px;
      --col-name:   220px;
      --col-cat:    120px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      font-size: 14px;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 210px;
      flex-shrink: 0;
      height: 100vh;
      position: sticky;
      top: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .sidebar-top {
      padding: 1.75rem 1.5rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .wordmark {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text);
    }

    .school-label {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.3rem;
      font-weight: 300;
    }

    .nav {
      flex: 1;
      padding: 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1px;
      overflow-y: auto;
    }

    .nav-group-label {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 1rem 0.5rem 0.4rem;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.6rem;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 400;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.12s, background 0.12s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      cursor: pointer;
    }

    .nav-link svg { width: 14px; height: 14px; flex-shrink: 0; stroke: currentColor; }
    .nav-link:hover { color: var(--text); background: var(--surface2); }
    .nav-link.active { color: var(--text); background: var(--surface2); font-weight: 500; }

    .sidebar-foot {
      padding: 1rem;
      border-top: 1px solid var(--border);
    }

    .user-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.4rem 0.5rem;
    }

    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--subtle);
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .user-meta { flex: 1; min-width: 0; }
    .user-name { font-size: 0.8rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
    .user-role { font-size: 0.68rem; color: var(--muted); }

    .btn-logout {
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 0.2rem;
      border-radius: 4px; transition: color 0.12s;
      display: flex; align-items: center;
    }
    .btn-logout:hover { color: var(--danger); }
    .btn-logout svg { width: 14px; height: 14px; }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    .topbar {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-shrink: 0;
    }

    .page-heading {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .class-tabs {
      display: flex;
      gap: 4px;
    }

    .class-tab {
      padding: 0.3rem 0.75rem;
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.12s;
      font-family: 'DM Sans', sans-serif;
    }

    .class-tab:hover { color: var(--text); border-color: var(--subtle); }
    .class-tab.active { color: var(--text); background: var(--surface2); border-color: var(--accent); }

    /* Search row */
    .toolbar {
      padding: 0.75rem 2rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .search-input {
      width: 280px;
      padding: 0.45rem 0.85rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.84rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.12s;
    }

    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: var(--accent); }

    /* ── Table ── */
    .table-wrap {
      flex: 1;
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    thead {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--surface);
    }

    thead th {
      font-size: 0.67rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    thead th:first-child  { width: var(--col-no);   padding-left: 2rem; text-align: left; }
    thead th:nth-child(2) { width: var(--col-name);  text-align: left; }
    thead th:not(:first-child):not(:nth-child(2)) {
      width: var(--col-cat);
      text-align: center;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    tbody tr:hover { background: var(--surface); }

    tbody td {
      padding: 0.55rem 0;
      vertical-align: middle;
    }

    td.col-no {
      padding-left: 2rem;
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 300;
      width: var(--col-no);
    }

    td.col-name {
      width: var(--col-name);
      font-size: 0.84rem;
      font-weight: 400;
      color: var(--text);
      padding-right: 1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: var(--col-name);
    }

    td.col-cat {
      width: var(--col-cat);
      text-align: center;
    }

    /* Counter */
    .counter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
    }

    .cbtn {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.1s;
      line-height: 1;
      font-family: 'DM Sans', sans-serif;
    }

    .cbtn:hover { background: var(--surface2); color: var(--text); }
    .cbtn.plus:hover  { color: var(--success); border-color: var(--success); }
    .cbtn.minus:hover { color: var(--danger);  border-color: var(--danger); }

    .cval {
      width: 32px;
      text-align: center;
      background: none;
      border: 1px solid transparent;
      border-radius: 4px;
      color: var(--text);
      font-size: 0.84rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      padding: 0.15rem 0;
      outline: none;
      transition: border-color 0.12s, background 0.12s;
      -moz-appearance: textfield;
      appearance: textfield;
    }

    .cval::-webkit-inner-spin-button,
    .cval::-webkit-outer-spin-button { -webkit-appearance: none;}

    .cval:focus {
      border-color: var(--accent);
      background: var(--surface2);
    }

    /* States */
    .state-msg {
      padding: 3rem 2rem;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 300;
    }

    /* Save toast */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 1rem;
      font-size: 0.78rem;
      color: var(--muted);
      display: none;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      z-index: 100;
    }

    .toast.show   { display: flex; }
    .toast.saving { color: var(--amber);   border-color: rgba(232,160,48,0.3); }
    .toast.saved  { color: var(--success); border-color: rgba(52,211,153,0.3); }

    .main { animation: fadeUp 0.25s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-top">

    <div class="school-label">SMA Negeri 6 Surakarta</div>
  </div>
  <nav class="nav">
    <span class="nav-group-label">Main</span>

    <a class="nav-link" href="/teacher/attendance.html">

    </a>
    <a class="nav-link" href="/teacher/materials.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>

    <a class="nav-link" href="/teacher/gallery.html">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>

    </a>
  </nav>
  <div class="sidebar-foot">
    <div class="user-row">
      <div class="avatar" id="avatar-initials">—</div>
      <div class="user-meta">
        <div class="user-name" id="user-name">Loading</div>

      </div>
      <button class="btn-logout theme-toggle-btn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
      <button class="btn-logout" onclick="handleLogout()" title="Log out">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <div class="page-heading">Activeness</div>
    <div class="class-tabs" id="class-tabs"></div>
  </div>

  <div class="toolbar">
    <input class="search-input" type="text" id="search" placeholder="Search student..." oninput="filterStudents()">
  </div>

  <div class="table-wrap">
    <table id="main-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Student</th>
          <th>Vocab Box</th>
          <th>Answering</th>
          <th>Presenting</th>
          <th>Task On Time</th>
          <th>Helping Hand</th>
          <th>Quiz</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="8"><div class="state-msg">Select a class to begin.</div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"><span id="toast-text">Saving...</span></div>

<script>
  const SUPABASE_URL = 'https://unbvljjgiqyphtykbkdb.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_DFTQJ5niT0OiWVwpeNwM1A_W18mJ1oT';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  const CLASSES = ['XE1','XE4','XE5','XE6','XE7','XE8','XE9','XE10','XE11'];
  const CATS    = ['vocabulary_box','answering','presenting','task_on_time','helping_hand','quiz'];

  let students   = [];
  let saveTimer  = null;
  const pending  = new Set();

  async function init() {
    const { data: { user } } = await db.auth.getUser();
    if (!user) { window.location.href = '/index.html'; return; }
    if (user.user_metadata?.role !== 'teacher') { window.location.href = '/student/dashboard.html'; return; }

    const name = user.email.split('@')[0];
    document.getElementById('user-name').textContent = name;
    document.getElementById('avatar-initials').textContent = name[0].toUpperCase();

    // Build class tabs
    document.getElementById('class-tabs').innerHTML = CLASSES.map(c =>
      `<button class="class-tab" onclick="selectClass('${c}')">${c}</button>`
    ).join('');
  }

  async function selectClass(cls) {
    // Tab highlight
    document.querySelectorAll('.class-tab').forEach(t =>
      t.classList.toggle('active', t.textContent === cls)
    );

    document.getElementById('search').value = '';
    setLoading();

    try {
      // Get class id
      const { data: classRow, error: e1 } = await db.from('classes').select('id').eq('name', cls).single();
      if (e1) throw e1;
      if (!classRow) return;

      // Get students
      const { data: rows, error: e2 } = await db
        .from('students')
        .select('id, full_name')
        .eq('class_id', classRow.id)
        .order('full_name');
      if (e2) throw e2;

      if (!rows || rows.length === 0) {
        document.getElementById('tbody').innerHTML =
          `<tr><td colspan="8"><div class="state-msg">No students in this class.</div></td></tr>`;
        return;
      }

      // Get activeness
      const { data: acts, error: e3 } = await db
        .from('activeness')
        .select('*')
        .in('student_id', rows.map(r => r.id));
      if (e3) throw e3;

      const actMap = {};
      (acts || []).forEach(a => actMap[a.student_id] = a);

      students = rows.map(r => ({
        id:            r.id,
        full_name:     r.full_name,
        activeness_id: actMap[r.id]?.id || null,
        vocabulary_box: actMap[r.id]?.vocabulary_box || 0,
        answering:      actMap[r.id]?.answering      || 0,
        presenting:     actMap[r.id]?.presenting     || 0,
        task_on_time:   actMap[r.id]?.task_on_time   || 0,
        helping_hand:   actMap[r.id]?.helping_hand   || 0,
        quiz:           actMap[r.id]?.quiz           || 0,
      }));

      renderRows(students);
    } catch(e) {
      document.getElementById('tbody').innerHTML =
        `<tr><td colspan="8"><div class="state-msg">Failed to load. Please refresh.</div></td></tr>`;
      console.error('selectClass:', e);
    }
  }

  function renderRows(list) {
    if (!list.length) {
      document.getElementById('tbody').innerHTML =
        `<tr><td colspan="8"><div class="state-msg">No students match your search.</div></td></tr>`;
      return;
    }

    document.getElementById('tbody').innerHTML = list.map((s, i) => `
      <tr data-name="${s.full_name.toLowerCase()}">
        <td class="col-no">${String(i + 1).padStart(2, '0')}</td>
        <td class="col-name" title="${s.full_name}">${s.full_name}</td>
        ${CATS.map(cat => `
          <td class="col-cat">
            <div class="counter">
              <button class="cbtn minus" onclick="adjust('${s.id}','${cat}',-1)">−</button>
              <input class="cval" type="number" min="0"
                value="${s[cat]}"
                data-sid="${s.id}" data-cat="${cat}"
                onchange="setVal('${s.id}','${cat}',this)"
                onfocus="this.select()"
              />
              <button class="cbtn plus" onclick="adjust('${s.id}','${cat}',1)">+</button>
            </div>
          </td>
        `).join('')}
      </tr>
    `).join('');
  }

  function setLoading() {
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="8"><div class="state-msg">Loading...</div></td></tr>`;
  }

  function filterStudents() {
    const q = document.getElementById('search').value.toLowerCase();
    renderRows(students.filter(s => s.full_name.toLowerCase().includes(q)));
  }

  function adjust(sid, cat, delta) {
    const s = students.find(s => s.id === sid);
    if (!s) return;
    s[cat] = Math.max(0, s[cat] + delta);
    const inp = document.querySelector(`input[data-sid="${sid}"][data-cat="${cat}"]`);
    if (inp) inp.value = s[cat];
    scheduleSave(sid);
  }

  function setVal(sid, cat, input) {
    const s = students.find(s => s.id === sid);
    if (!s) return;
    s[cat] = Math.max(0, parseInt(input.value) || 0);
    input.value = s[cat];
    scheduleSave(sid);
  }

  function scheduleSave(sid) {
    pending.add(sid);
    showToast('saving');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveAll, 800);
  }

  async function saveAll() {
    const ids = [...pending];
    pending.clear();

    for (const sid of ids) {
      const s = students.find(s => s.id === sid);
      if (!s) continue;

      const payload = {
        student_id:     s.id,
        vocabulary_box: s.vocabulary_box,
        answering:      s.answering,
        presenting:     s.presenting,
        task_on_time:   s.task_on_time,
        helping_hand:   s.helping_hand,
        quiz:           s.quiz,
        updated_at:     new Date().toISOString(),
      };

      if (s.activeness_id) {
        await db.from('activeness').update(payload).eq('id', s.activeness_id);
      } else {
        const { data } = await db.from('activeness').insert(payload).select('id').single();
        if (data) s.activeness_id = data.id;
      }
    }

    showToast('saved');
    setTimeout(hideToast, 2000);
  }

  function showToast(state) {
    const el = document.getElementById('toast');
    document.getElementById('toast-text').textContent = state === 'saving' ? 'Saving...' : 'Saved';
    el.className = 'toast show ' + state;
  }

  function hideToast() {
    document.getElementById('toast').className = 'toast';
  }

  async function handleLogout() {
    await db.auth.signOut();
    window.location.href = '/index.html';
  }

  init().catch(console.error);
</script>
</body>
