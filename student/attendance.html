<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>English Quest — My Attendance</title>
  <script src="/theme.js"></script>
  <link rel="stylesheet" href="/shared.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0c0c0f;--surface:#131317;--surface2:#1a1a20;--border:#222228;--accent:#7c6ffa;--amber:#e8a030;--text:#dddde8;--muted:#5a5a70;--subtle:#2e2e3a;--success:#34d399;--danger:#f87171}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
    nav{position:sticky;top:0;z-index:50;background:rgba(12,12,15,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:52px}
    .nav-brand{font-size:.88rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
    .nav-links{display:flex;align-items:center;gap:.25rem}
    .nav-link{padding:.4rem .75rem;border-radius:6px;font-size:.82rem;color:var(--muted);text-decoration:none;transition:color .12s,background .12s;cursor:pointer;border:none;background:none;font-family:'DM Sans',sans-serif}
    .nav-link:hover,.nav-link.active{color:var(--text);background:var(--surface2)}
    .nav-user{display:flex;align-items:center;gap:.6rem;padding:.3rem .75rem .3rem .4rem;border-radius:999px;background:var(--surface);border:1px solid var(--border)}
    .nav-avatar{width:24px;height:24px;border-radius:50%;background:var(--accent);color:white;font-size:.7rem;font-weight:700;display:flex;align-items:center;justify-content:center}
    .nav-username{font-size:.8rem;font-weight:500}
    .btn-logout{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.78rem;padding:.2rem .4rem;border-radius:4px;transition:color .12s;font-family:'DM Sans',sans-serif}
    .btn-logout:hover{color:var(--danger)}
    .page{max-width:700px;margin:0 auto;padding:2.5rem 2rem 4rem;animation:fadeUp .25s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .page-label{font-size:.72rem;font-weight:500;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:.4rem}
    .page-title{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:700;letter-spacing:-.02em;margin-bottom:2rem}
    .summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:2rem}
    .summary-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem;text-align:center}
    .summary-label{font-size:.68rem;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.4rem}
    .summary-value{font-size:1.75rem;font-weight:700;line-height:1}
    .summary-value.present{color:var(--success)}
    .summary-value.absent{color:var(--danger)}
    .summary-value.permit{color:var(--amber)}
    .table-wrap{border:1px solid var(--border);border-radius:10px;overflow:hidden}
    table{border-collapse:collapse;width:100%}
    thead{background:var(--surface)}
    thead th{font-size:.67rem;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:.65rem 1rem;border-bottom:1px solid var(--border);text-align:left}
    tbody tr{border-bottom:1px solid var(--border);background:var(--surface);transition:background .1s}
    tbody tr:last-child{border-bottom:none}
    tbody tr:hover{background:var(--surface2)}
    tbody td{padding:.55rem 1rem;font-size:.84rem}
    .badge{display:inline-block;padding:.15rem .55rem;border-radius:6px;font-size:.72rem;font-weight:600;letter-spacing:.04em}
    .badge.present{background:rgba(52,211,153,.1);color:var(--success);border:1px solid rgba(52,211,153,.2)}
    .badge.absent{background:rgba(248,113,113,.1);color:var(--danger);border:1px solid rgba(248,113,113,.2)}
    .badge.permit{background:rgba(232,160,48,.1);color:var(--amber);border:1px solid rgba(232,160,48,.2)}
    .state-msg{padding:2rem;color:var(--muted);font-size:.84rem;text-align:center}
    @media(max-width:900px){.nav-links{display:none}}
    @media(max-width:700px){nav{padding:0 1rem}.page{padding:1.5rem 1rem 3rem}.summary-row{grid-template-columns:1fr 1fr 1fr}}
  </style>
</head>
<body>
<nav>
  <a class="nav-brand" href="/index.html">English Quest</a>
  <div class="nav-links">
    <a class="nav-link" href="/student/dashboard.html">Dashboard</a>
    <a class="nav-link" href="/student/tasks.html">Tasks</a>
    <a class="nav-link" href="/student/submissions.html">Submissions</a>
    <a class="nav-link" href="/student/activeness.html">Activeness</a>
    <a class="nav-link active" href="/student/attendance.html">Attendance</a>
    <button class="nav-btn ghost theme-toggle-btn" onclick="toggleTheme()" aria-label="Toggle theme">🌙</button>
  </div>
  <div class="nav-actions">
    <div class="nav-user">
      <div class="nav-avatar" id="nav-avatar">?</div>
      <div class="nav-username" id="nav-username">—</div>
    </div>
    <button class="btn-logout" onclick="handleLogout()" aria-label="Log out">Sign out</button>
  </div>
</nav>
<div class="page">
  <div class="page-label">My Record</div>
  <div class="page-title">Attendance</div>

  <div class="summary-row">
    <div class="summary-card"><div class="summary-label">Present</div><div class="summary-value present" id="cnt-present">—</div></div>
    <div class="summary-card"><div class="summary-label">Absent</div><div class="summary-value absent" id="cnt-absent">—</div></div>
    <div class="summary-card"><div class="summary-label">Permit</div><div class="summary-value permit" id="cnt-permit">—</div></div>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr><th>Date</th><th>Status</th></tr></thead>
      <tbody id="att-tbody"><tr><td colspan="2"><div class="state-msg">Loading...</div></td></tr></tbody>
    </table>
  </div>
</div>
<script>
const SUPABASE_URL='https://unbvljjgiqyphtykbkdb.supabase.co';
const SUPABASE_KEY='sb_publishable_DFTQJ5niT0OiWVwpeNwM1A_W18mJ1oT';
const{createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_KEY);

async function init(){
  const{data:{user}}=await db.auth.getUser();
  if(!user){window.location.href='/index-login.html';return}
  if(user.user_metadata?.role==='teacher'){window.location.href='/teacher/dashboard.html';return}

  const{data:student}=await db.from('students').select('*').eq('user_id',user.id).single();
  if(!student)return;

  const firstName=student.full_name.split(' ')[0];
  document.getElementById('nav-avatar').textContent=firstName[0].toUpperCase();
  document.getElementById('nav-username').textContent=firstName;

  try{
    const{data:records,error}=await db
      .from('attendance')
      .select('date,status')
      .eq('student_id',student.id)
      .order('date',{ascending:false});
    if(error)throw error;

    const counts={Present:0,Absent:0,Permit:0};
    (records||[]).forEach(r=>{if(counts[r.status]!==undefined)counts[r.status]++});
    document.getElementById('cnt-present').textContent=counts.Present;
    document.getElementById('cnt-absent').textContent=counts.Absent;
    document.getElementById('cnt-permit').textContent=counts.Permit;

    if(!records||!records.length){
      document.getElementById('att-tbody').innerHTML='<tr><td colspan="2"><div class="state-msg">No attendance records yet.</div></td></tr>';
      return;
    }

    document.getElementById('att-tbody').innerHTML=records.map(r=>`
      <tr>
        <td>${new Date(r.date).toLocaleDateString('en-ID',{weekday:'short',day:'numeric',month:'long',year:'numeric'})}</td>
        <td><span class="badge ${r.status.toLowerCase()}">${r.status}</span></td>
      </tr>`).join('');
  }catch(e){
    document.getElementById('att-tbody').innerHTML='<tr><td colspan="2"><div class="state-msg">Failed to load. Please refresh.</div></td></tr>';
    console.error('init:',e);
  }
}
async function handleLogout(){await db.auth.signOut();window.location.href='/index-login.html'}
init().catch(console.error);
</script>
</body>
</html>
