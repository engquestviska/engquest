<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>English Quest — Submissions</title>
  <script src="/theme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0c0c0f;--surface:#131317;--surface2:#1a1a20;--border:#222228;--accent:#7c6ffa;--amber:#e8a030;--text:#dddde8;--muted:#5a5a70;--subtle:#2e2e3a;--success:#34d399;--danger:#f87171}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
    nav{position:sticky;top:0;z-index:50;background:rgba(12,12,15,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:52px}
    .nav-brand{font-size:.88rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
    .nav-links{display:flex;align-items:center;gap:.25rem}
    .nav-link{padding:.4rem .75rem;border-radius:6px;font-size:.82rem;color:var(--muted);text-decoration:none;transition:color .12s,background .12s;cursor:pointer;border:none;background:none;font-family:'DM Sans',sans-serif}
    .nav-link:hover,.nav-link.active{color:var(--text);background:var(--surface2)}
    .nav-user{display:flex;align-items:center;gap:.6rem;padding:.3rem .75rem .3rem .4rem;border-radius:999px;background:var(--surface);border:1px solid var(--border)}
    .nav-avatar{width:24px;height:24px;border-radius:50%;background:var(--accent);color:white;font-size:.7rem;font-weight:700;display:flex;align-items:center;justify-content:center}
    .nav-username{font-size:.8rem;font-weight:500}
    .btn-logout{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.78rem;padding:.2rem .4rem;border-radius:4px;transition:color .12s;font-family:'DM Sans',sans-serif}
    .btn-logout:hover{color:var(--danger)}
    .page{max-width:800px;margin:0 auto;padding:2.5rem 2rem 4rem;animation:fadeUp .25s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .page-header{margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
    .page-label{font-size:.72rem;font-weight:500;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:.4rem}
    .page-title{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:700;letter-spacing:-.02em}
    .page-sub{font-size:.82rem;color:var(--muted);font-weight:300;margin-top:.3rem}
    .chapter-tabs{display:flex;gap:4px;margin-bottom:1.5rem}
    .chapter-tab{padding:.4rem 1rem;border-radius:6px;font-size:.82rem;font-weight:500;color:var(--muted);background:none;border:1px solid var(--border);cursor:pointer;transition:all .12s;font-family:'DM Sans',sans-serif}
    .chapter-tab:hover{color:var(--text);border-color:var(--subtle)}
    .chapter-tab.active{color:var(--text);background:var(--surface2);border-color:var(--accent)}
    .notice{background:rgba(233,162,59,0.08);border:1px solid rgba(233,162,59,0.2);border-radius:8px;padding:.75rem 1rem;font-size:.82rem;color:var(--amber);margin-bottom:1.5rem;font-weight:300}
    .task-grid{display:flex;flex-direction:column;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden}
    .task-card{background:var(--surface);padding:1.25rem 1.5rem;display:flex;align-items:center;gap:1rem;transition:background .12s}
    .task-card:hover{background:var(--surface2)}
    .task-info{flex:1;min-width:0}
    .task-name{font-size:.9rem;font-weight:500;margin-bottom:.2rem}
    .task-status{font-size:.75rem;font-weight:400}
    .task-status.submitted{color:var(--success)}
    .task-status.not-submitted{color:var(--muted)}
    .task-actions{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
    .btn-upload{padding:.4rem .9rem;border-radius:6px;font-size:.78rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text);transition:all .12s;font-family:'DM Sans',sans-serif}
    .btn-upload:hover{border-color:var(--accent);color:var(--accent)}
    .btn-view{padding:.4rem .9rem;border-radius:6px;font-size:.78rem;font-weight:500;cursor:pointer;border:1px solid rgba(52,211,153,0.3);background:rgba(52,211,153,0.06);color:var(--success);transition:all .12s;font-family:'DM Sans',sans-serif;text-decoration:none}
    .btn-view:hover{background:rgba(52,211,153,0.12)}
    .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .status-dot.submitted{background:var(--success)}
    .status-dot.not-submitted{background:var(--subtle)}
    .uploading-bar{height:2px;background:var(--accent);border-radius:999px;width:0;transition:width .3s;margin-top:.5rem}
    .file-input{display:none}
    .toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.55rem 1rem;font-size:.78rem;color:var(--muted);display:none;align-items:center;gap:.5rem;box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:100}
    .toast.show{display:flex}
    .toast.success{color:var(--success);border-color:rgba(52,211,153,.3)}
    .toast.error{color:var(--danger);border-color:rgba(248,113,113,.3)}
    .toast.loading{color:var(--amber);border-color:rgba(232,160,48,.3)}
    .skel{background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:4px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    @media(max-width:600px){nav{padding:0 1rem}.page{padding:1.5rem 1rem 3rem}}
  </style>
</head>
<body>
<nav>
  <div class="nav-brand">English Quest</div>
  <div class="nav-links">
  <a class="nav-link" href="/student/dashboard.html">Dashboard</a>
  <a class="nav-link" href="/student/tasks.html">Tasks</a>
  <a class="nav-link" href="/student/submissions.html">Submissions</a>
  <button class="nav-btn ghost theme-toggle-btn" onclick="toggleTheme()" style="font-size:1rem;padding:.4rem .6rem;">🌙</button>
</div>
  <div style="display:flex;align-items:center;gap:.5rem">
    <div class="nav-user">
      <div class="nav-avatar" id="nav-avatar">?</div>
      <div class="nav-username" id="nav-username">—</div>
    </div>
    <button class="btn-logout" onclick="handleLogout()">Sign out</button>
  </div>
</nav>
<div class="page">
  <div class="page-header">
    <div class="page-label">Task Submission</div>
    <div class="page-title">Submit Your Tasks</div>
    <div class="page-sub">PDF files only · Max 10MB per file · You can resubmit to overwrite</div>
  </div>
  <div class="chapter-tabs">
    <button class="chapter-tab active" onclick="switchChapter('C5',this)">Chapter 5</button>
</div>
  <div class="notice">📄 PDF files only. Do not upload photos or images. Convert your work to PDF first.</div>
  <div class="task-grid" id="task-grid">
    <div class="task-card"><div class="skel" style="height:40px;width:100%"></div></div>
    <div class="task-card"><div class="skel" style="height:40px;width:100%"></div></div>
    <div class="task-card"><div class="skel" style="height:40px;width:100%"></div></div>
  </div>
</div>
<div class="toast" id="toast"><span id="toast-text"></span></div>
<input type="file" class="file-input" id="file-input" accept=".pdf" onchange="handleFileSelected(this)">
<script>
const SUPABASE_URL='https://unbvljjgiqyphtykbkdb.supabase.co';
const SUPABASE_KEY='sb_publishable_DFTQJ5niT0OiWVwpeNwM1A_W18mJ1oT';
const {createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_KEY);
const CHAPTERS={C5:{label:'Chapter 5',tasks:5}};
let myStudent=null,currentChapter='C5',submissionsMap={},pendingUpload=null;

async function init(){
  const{data:{user}}=await db.auth.getUser();
  if(!user){window.location.href='/index-login.html';return}
  if(user.user_metadata?.role==='teacher'){window.location.href='/teacher/dashboard.html';return}
  const{data:student}=await db.from('students').select('*,classes(name)').eq('user_id',user.id).single();
  if(!student){return}
  myStudent=student;
  const firstName=student.full_name.split(' ')[0];
  document.getElementById('nav-avatar').textContent=firstName[0].toUpperCase();
  document.getElementById('nav-username').textContent=firstName;
  await loadSubmissions();
  renderTasks('C5');
}

async function loadSubmissions(){
  const{data}=await db.from('submissions').select('*').eq('student_id',myStudent.id);
  submissionsMap={};
  (data||[]).forEach(s=>{submissionsMap[s.chapter+'_'+s.task_number]=s});
}

function switchChapter(ch,btn){
  currentChapter=ch;
  document.querySelectorAll('.chapter-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderTasks(ch);
}

function renderTasks(ch){
  const count=CHAPTERS[ch].tasks;
  const label=CHAPTERS[ch].label;
  let html='';
  for(let t=1;t<=count;t++){
    const key=ch+'_'+t;
    const sub=submissionsMap[key];
    const submitted=!!sub;
    const date=sub?new Date(sub.submitted_at).toLocaleDateString('en-ID',{day:'numeric',month:'short',year:'numeric'}):null;
    html+=`<div class="task-card" id="task-card-${key}">
      <div class="status-dot ${submitted?'submitted':'not-submitted'}"></div>
      <div class="task-info">
        <div class="task-name">${label} — Task ${t}</div>
        <div class="task-status ${submitted?'submitted':'not-submitted'}">
          ${submitted?'Submitted · '+date:'Not submitted yet'}
        </div>
        <div class="uploading-bar" id="bar-${key}"></div>
      </div>
      <div class="task-actions">
        ${submitted?`<button class="btn-view" onclick="viewFile('${sub.file_url}')">View</button>`:''}
        <button class="btn-upload" onclick="triggerUpload('${ch}',${t},'${key}')">
          ${submitted?'Resubmit':'Upload PDF'}
        </button>
      </div>
    </div>`;
  }
  document.getElementById('task-grid').innerHTML=html;
}

function triggerUpload(ch,task,key){
  pendingUpload={ch,task,key};
  document.getElementById('file-input').value='';
  document.getElementById('file-input').click();
}

async function handleFileSelected(input){
  if(!input.files||!input.files[0])return;
  const file=input.files[0];
  const{ch,task,key}=pendingUpload;

  if(file.type!=='application/pdf'){showToast('PDF files only','error');return}
  if(file.size>10*1024*1024){showToast('File too large (max 10MB)','error');return}

  const bar=document.getElementById('bar-'+key);
  bar.style.width='30%';
  showToast('Uploading...','loading');

  // Build storage path: studentid/chapter/task.pdf
  const path = `${myStudent.user_id}/${ch}/task${task}.pdf`

  // Upload to Supabase Storage
  const{error:uploadError}=await db.storage.from('submissions').upload(path,file,{upsert:true,contentType:'application/pdf'});

  if(uploadError){
    bar.style.width='0';
    showToast('Upload failed: '+uploadError.message,'error');
    return;
  }

  bar.style.width='70%';

  // Get public URL
  const fileUrl=path;

  // Upsert submission record
  const existing=submissionsMap[key];
  if(existing){
    await db.from('submissions').update({file_url:fileUrl,submitted_at:new Date().toISOString()}).eq('id',existing.id);
  }else{
    const{data:newSub}=await db.from('submissions').insert({
      student_id:myStudent.id,
      chapter:ch,
      task_number:task,
      file_url:fileUrl,
      submitted_at:new Date().toISOString()
    }).select().single();
    if(newSub)submissionsMap[key]=newSub;
  }

  bar.style.width='100%';
  setTimeout(()=>{bar.style.width='0'},800);

  // Refresh
  await loadSubmissions();
  renderTasks(currentChapter);
  showToast('Submitted successfully!','success');
}

function showToast(msg,type){
  const el=document.getElementById('toast');
  document.getElementById('toast-text').textContent=msg;
  el.className='toast show '+(type||'');
  clearTimeout(window._toastTimer);
  if(type!=='loading')window._toastTimer=setTimeout(()=>el.className='toast',3000);
}

async function viewFile(path){
  const{data}=await db.storage.from('submissions').createSignedUrl(path,3600);
  if(data?.signedUrl)window.open(data.signedUrl,'_blank');
  else showToast('Could not open file','error');
}
async function handleLogout(){await db.auth.signOut();window.location.href='/index-login.html'}

init();
</script>
</body>
</html>
